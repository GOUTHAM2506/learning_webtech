<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <center>
      <h1><mark>Student Registration Form</mark></h1>
    </center>
    <form action="">
      <fieldset>
        <legend>Personal Information</legend>
        <table>
          <tr>
            <td>
              <label for="fn">First Name : </label>
            </td>
            <td><input type="text" name="firstName" id="fn" /></td>
          </tr>
          <tr>
            <td>
              <label for="ln">Last Name : </label>
            </td>
            <td><input type="text" name="lastName" id="ln" /></td>
          </tr>
          <tr>
            <td>
              <label for="em">Email : </label>
            </td>
            <td><input type="email" name="email" id="em" /></td>
          </tr>
          <tr>
            <td>
              <label for="ph">Phone Number : </label>
            </td>
            <td><input type="tel" name="phoneNumber" id="ph" /></td>
          </tr>
          <tr>
            <td><label for="dob">Date of Birth : </label></td>
            <td><input type="date" name="dob" id="dob" /></td>
          </tr>
          <tr>
            <td><label for="gen">Gender : </label></td>
            <td>
              <input type="radio" name="gender" id="gen" />Male
              <input type="radio" name="gender" id="gen" />Female
            </td>
          </tr>
        </table>
      </fieldset>
      <br />
      <fieldset>
        <legend>Academic Information</legend>
        <table>
          <tr>
            <td><label for="course">Select Course : </label></td>
            <td>
              <select name="course" id="course">
                <option value="" disabled selected>--Select a Course--</option>
                <option value="Frontend Developer">Frontend Developer</option>
                <option value="Backend Developer">Backend Developer</option>
                <option value="Full-Stack Developer">
                  Full-Stack Developer
                </option>
                <option value="MERN Stack Developer">
                  MERN Stack Developer
                </option>
                <option value="MEAN Stack Developer">
                  MEAN Stack Developer
                </option>
                <option value="AI/ML Developer">AI/ML Developer</option>
              </select>
            </td>
          </tr>
          <tr>
            <td><label for="skill">Skills : </label></td>
            <td>
              <input
                type="text"
                name="skill"
                id="skill"
                list="skills"
                placeholder="Select or type a skill"
              />
              <datalist id="skills">
                <option value="HTML">HTML</option>
                <option value="CSS">CSS</option>
                <option value="JS">JS</option>
                <option value="SQL">SQL</option>
                <option value="JAVA">JAVA</option>
                <option value="PYTHON">PYTHON</option>
              </datalist>
            </td>
          </tr>
          <tr>
            <td><label for="ad">Address : </label></td>
            <td>
              <textarea
                name="address"
                id="ad"
                cols="40px"
                rows="5px"
              ></textarea>
            </td>
          </tr>
        </table>
      </fieldset>
      <br />
      <fieldset>
        <legend>Login Credentials</legend>
        <table>
          <tr>
            <td><label for="un">Username : </label></td>
            <td><input type="text" name="userName" id="un" /></td>
          </tr>
          <tr>
            <td><label for="pass">Password : </label></td>
            <td><input type="password" name="password" id="pass" /></td>
          </tr>
          <tr>
            <td><label for="cpass">Confirm Password : </label></td>
            <td><input type="password" name="confirmPassword" id="cpass" /></td>
          </tr>
        </table>
      </fieldset>
      <br />
      <fieldset>
        <legend>Declaration</legend>
        <table>
          <tr>
            <td>
              <input type="checkbox" name="agree" id="agree" />
              <label for="">I agree to the Terms & conditions</label>
            </td>
            <td></td>
          </tr>
          <tr>
            <td colspan="2px">
              <center>
                <input type="submit" value="Register" />
                <input type="reset" value="Reset" />
              </center>
            </td>
            <td></td>
          </tr>
        </table>
      </fieldset>
    </form>
  </body>
</html>
