<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }
      body {
        width: 100%;
        height: 100vh;
        display: flex;
        gap: 25px;
        flex-direction: column;
        align-items: center;
      }
      img {
        width: 250px;
        height: 300px;
        filter: drop-shadow(0px 7px 29px black) grayscale(100%) blur(5px);
        /* transition: filter 20s linear; */
      }
      div {
        width: 100%;
        display: flex;
        justify-content: space-evenly;
      }
      img:hover {
        filter: grayscale(0%) blur(0px);
      }
    </style>
  </head>
  <body>
    <h1>Box-Shadow vs Drop-Shadow</h1>
    <div>
      <img src="../images/clipart3034555.png" alt="" />
      <img src="../images/clipart3034555.png" alt="" />
      <img src="../images/clipart3034555.png" alt="" />
    </div>
  </body>
</html>
