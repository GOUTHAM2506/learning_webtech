<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Background Properties</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      h1 {
        margin-bottom: 20px;
      }
      .box {
        width: 100%;
        height: 85vh;
        border: 1px solid;
        background-image: url("https://m.media-amazon.com/images/M/MV5BOTcxNzNmMzItYTk0ZC00YmM4LThhYTQtOTFhYzE4YjNkODhmXkEyXkFqcGdeQWpnYW1i._V1_.jpg");
        background-repeat: no-repeat;
        background-position: center;
      }
    </style>
  </head>
  <body>
    <h1>background-image : url("path")</h1>
    <div class="box" id="box1"></div>
  </body>
</html>
