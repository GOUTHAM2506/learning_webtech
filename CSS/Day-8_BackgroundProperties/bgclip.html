<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Background Clip</title>
    <style>
      h1 {
        font-size: 300px;
        background-clip: text;
        color: transparent;
        background-image: url("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRp8nPKJX4YNgJ2PQToQnh6Gs4uSvDTZNgaug&s");
        background-repeat: no-repeat;
        background-position: center;
        background-size: cover;
      }
    </style>
  </head>
  <body>
    <h1>Dr. House</h1>
  </body>
</html>
