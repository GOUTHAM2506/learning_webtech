<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      .box {
        width: 100%;
        height: 100vh;
        border: 2px solid;
        background-repeat: no-repeat;
        background-position: center;
        background-size: contain;
        background-attachment: fixed;
        text-align: center;
        line-height: 100vh;
        color: white;
        font-size: 30px;
      }
      #box1 {
        background-image: url("https://i.pinimg.com/1200x/81/a0/86/81a08658d5247eafa6367e380c9aaace.jpg");
      }
      #box2 {
        background-image: url("https://i.pinimg.com/1200x/e8/70/a1/e870a1fda8fe173f5dbd019f4f4f024e.jpg");
      }
      #box3 {
        background-image: url("https://i.pinimg.com/736x/fa/5b/7e/fa5b7e5ba4b42f2a310386db20b284f9.jpg");
      }
      #box4 {
        background-image: url("https://i.pinimg.com/736x/e8/e5/19/e8e519eb6e26fd94db0110a02c5eb8b4.jpg");
      }
      #box5 {
        background-image: url("https://i.pinimg.com/736x/91/50/4c/91504c4df04c59e238bfc2976491e2e3.jpg");
      }
      #box6 {
        background-image: url("https://i.pinimg.com/736x/c6/d6/59/c6d6598aaaac23541ae8e24de4a6cf71.jpg");
      }
    </style>
  </head>
  <body>
    <div class="box" id="box1">Phil Dunphy</div>
    <div class="box" id="box2">Jay Pritchett</div>
    <div class="box" id="box3">Claire Dunphy</div>
    <div class="box" id="box4">Gloria Delgado-Pritchett</div>
    <div class="box" id="box5">Mitchell Pritchett</div>
    <div class="box" id="box6">Cameron Tucker</div>
  </body>
</html>
