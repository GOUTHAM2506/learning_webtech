<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>

        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }
      .circle {
        width: 600px;
