<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }
      body {
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-evenly;
      }
      .parent {
        width: 70%;
        height: 400px;
        background-color: sandybrown;
        display: flex;
        justify-content: space-evenly;
        align-items: center;
        border-radius: 10px;
      }
      .box {
        width: 200px;
        height: 200px;
        background-color: aquamarine;
        font-size: 15px;
        border: 1px solid black;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: all 0.5s linear;
      }
      #box1{
        background: url(https://5.imimg.com/data5/DK/KT/WM/SELLER-57230940/hyundai-car-wheel.jpg);
        background-position: center;
        background-repeat: no-repeat;
        background-size: cover;
      }
      #box1:hover {
        transform: rotate(360deg);
        background: url(https://5.imimg.com/data5/DK/KT/WM/SELLER-57230940/hyundai-car-wheel.jpg)
          no-repeat c;
      }
      #box2:hover {
        transform: rotateX(180deg);
      }
      #box3:hover {
        transform: rotateY(180deg);
      }
    </style>
  </head>
  <body>
    <h1>Transform: Rotate(Deg) Property Demo</h1>
    <div class="parent">
      <div class="box" id="box1"></div>
      <div class="box" id="box2">RotateX()</div>
      <div class="box" id="box3">RotateY()</div>
    </div>
  </body>
</html>
