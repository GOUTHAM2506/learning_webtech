<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HSL</title>
    <style>
      .box {
        width: 200px;
        height: 200px;
        border: 1px solid greenyellow;
        display: inline-block;
      }
      #box1 {
        background-color: hsl(0, 52%, 55%);
      }
      #box2 {
        background-color: hsl(170, 50%, 50%);
      }
      #box3 {
        background-color: hsl(318, 52%, 48%);
      }
    </style>
  </head>
  <body>
    <h1>HSL Demo</h1>
    <h2>
      H - Hue(0deg to 360deg), S - Saturation(0% to 100%), L - Lightness(0% ot
      100%)
    </h2>
    <div class="box" id="box1">Box-1</div>
    <div class="box" id="box2">Box-2</div>
    <div class="box" id="box3">Box-3</div>
  </body>
</html>
