<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      /* ID selector */
      #tvk {
        color: red;
        background-color: yellow;
      }
      /* Class Selector */
      .tn {
        color: green;
        border: 1px solid red;
        background-color: white;
      }
      /* Tagname or element name selector */
      div {
        width: 300px;
        height: 300px;
        background-color: salmon;
      }
      /* Universal Selector */
      * {
        background-color: black;
      }
    </style>
  </head>
  <body>
    <h1>1. Simple Selectors - id, class, tagname, universal</h1>
    <h2 id="tvk">Today TVK will win by majority</h2>
    <h2>May be DMK also will win.</h2>
    <hr />
    <p class="tn">AIDMK</p>
    <p class="tn">DMK</p>
    <p class="tn">NTK</p>
    <hr />
    <div></div>
  </body>
</html>
