<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Table Tag in HTML</h1>
    <!-- Table has '>' which is a child selector -->
    <table border="1">
      <caption >
        <strong>Student Data</strong>
      </caption>
      <!-- tr stands for table row -->
      <tr>
        <!-- th stands for table heading -->
        <th>Profile</th>
        <th>S.No</th>
        <th>Name of the Students</th>
        <th>Age</th>
      </tr>
      <tr>
        <!-- td stands for table data -->
        <td>
          <img
            src="https://i.pinimg.com/736x/4e/40/dd/4e40ddcec07a319038d4bb2f64bf7c8f.jpg"
            alt=""
            width="75px"
            height="75px"
          />
        </td>
        <th>1</th>
        <td>Red Robin</td>
        <td rowspan="2">25</td>
      </tr>
      <tr>
        <td>
          <img
            src="https://i.pinimg.com/736x/e2/7f/34/e27f34ea0996fda8456fd6973d462bd5.jpg"
            alt=""
            width="75px"
            height="75px"
          />
        </td>
        <th>2</th>
        <td>Red Wood</td>
        <!-- <td>20</td>     -->
      </tr>
      <tr>
        <td>
          <img
            src="https://i.pinimg.com/1200x/14/cc/d9/14ccd9eb2fb5325d02fbb6fac980a36b.jpg"
            alt=""
            width="75px"
            height="75px"
          />
        </td>
        <th>3</th>
        <td>NightWing</td>
        <td>27</td>
      </tr>
      <tr>
        <th colspan="3">Total Number of Students</th>
        <th>3</th>
      </tr>
    </table>
  </body>
</html>
