<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Audio Tag in HTML</h1>
    <audio
      src="./assets/23 Theme (From _AA23_) - NaaSongs.mp3"
      controls
      muted
      autoplay
      loop
    ></audio>
    <hr />
    <audio
      src="http://webaudioapi.com/samples/audio-tag/chrono.mp3"
      controls
    ></audio>
    <hr />
    <h2>Audio Tag by using source tag</h2>
    <audio controls>
      <source
        src="./assets/23 Theme (From _AA23_) - NaaSongs.mp3"
        type="audio/mp3"
      />
    </audio>
  </body>
</html>
