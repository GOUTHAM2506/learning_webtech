<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>iframe tag in HTML</h1>
    <h2>1. Embedding External Webpages by using iframe tag</h2>
    <iframe
      src="https://www.ndtv.com/"
      frameborder="1"
      width="800"
      height="500"
    ></iframe>
    <hr />
    <h2>2. Embeddding our own internal webpages by using iframe tag</h2>
    <iframe
      src="./videotag.html"
      frameborder="1"
      width="500"
      height="400"
    ></iframe>
    <hr />
    <h2>3. Embedding You Tube Videos by using iframe tag</h2>
    <iframe
      width="560"
      height="315"
      src="https://www.youtube.com/embed/7A3MuE5CQjI?si=3nSi4Kw9ENmCnmJS"
      title="YouTube video player"
      frameborder="0"
      allow="
        accelerometer;
        autoplay;
        clipboard-write;
        encrypted-media;
        gyroscope;
        picture-in-picture;
        web-share;
      "
      referrerpolicy="strict-origin-when-cross-origin"
      allowfullscreen
    ></iframe>
    <hr />
    <h2>4. Embedding Google Maps by using iframe tag</h2>
    <iframe
      src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d7778.533218593947!2d80.24827999066517!3d12.89057054966936!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3a525b6768f3160f%3A0x5365c199a0caea88!2sECR%20Beach!5e0!3m2!1sen!2sin!4v1777622894758!5m2!1sen!2sin"
      width="600"
      height="450"
      style="border: 0"
      allowfullscreen=""
      loading="lazy"
      referrerpolicy="no-referrer-when-downgrade"
    ></iframe>
    
  </body>
</html>
