<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Video Tag in HTML</h1>
    <video
      src="./assets/Tom and Jerry A Night Before Christmas.mp4"
      controls
      poster="./assets/thumbnail.png"
      width="500"
      height="400"
    ></video>
    <hr />
    <video controls width="500" height="400" poster="./assets/thumbnail.png">
      <source
        src="./assets/Tom and Jerry A Night Before Christmas.mp4"
        type="video/mp4"
      />
    </video>
  </body>
</html>
