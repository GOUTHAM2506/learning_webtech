<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Select (Dropdown) in HTML</h1>
    <form action="">
      <div>
        <label for="state">State : </label>
        <select name="state" id="state">
          <option value="" disabled selected>Select your state</option>
          <option value="Tamil Nadu">Tamil Nadu</option>
          <option value="Kerala">Kerala</option>
          <option value="Andra Pradesh">Andra Pradesh</option>
          <option value="Karnataka">Karnataka</option>
        </select>
      </div>
      <br />
      <div>
        <label for="roles">Roles : </label>
        <select name="roles" id="roles">
          <option value="" disabled selected>Select your role</option>
          <option value="Frontend Developer">Frontend Developer</option>
          <option value="Backend Developer">Backend Developer</option>
          <option value="Full-Stack Developer">Full-Stack Developer</option>
          <option value="MERN Stack Developer">MERN Stack Developer</option>
          <option value="MEAN Stack Developer">MEAN Stack Developer</option>
          <option value="AI/ML Developer">AI/ML Developer</option>
        </select>
      </div>
      <br />
      <div>
        <label for="ff">Fast Food :</label>
        <select name="ff" id="ff">
          <option value="" disabled selected>
            Select your Favourite Fast Food
          </option>
          <option value="Chicken Fried Rice">Chicken Fried Rice</option>
          <option value="Chicken Briyani">Chicken Briyani</option>
          <option value="Mutton Briyani">Mutton Briyani</option>
          <option value="Pizza">Pizza</option>
          <option value="Burger">Burger</option>
          <option value="Taco">Taco</option>
        </select>   
      </div>
      <br />
      <div><button>Sumbit</button></div>
    </form>
  </body>
</html>
