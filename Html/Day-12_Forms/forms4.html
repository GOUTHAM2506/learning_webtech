<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form action="">
      <fieldset>
        <legend><h1>Student Registration Form</h1></legend>
        <div>
          <label for="first">FirstName : </label>
          <input
            type="text"
            name="firstName"
            id="first"
            placeholder="Enter your FirstName"
          />
        </div>
        <br />
        <div>
          <label for="last">LastName : </label>
          <input
            type="text"
            name="lastName"
            id="last"
            placeholder="Enter your LastName"
          />
        </div>
        <br />
        <div>
          <label for="gender">Gender : </label>
          <input type="radio" name="gender" id="gender" />Male
          <input type="radio" name="gender" id="gender" />Female
          <input type="radio" name="gender" id="gender" />Others
        </div>
        <br />
        <div>
          <label for="dob">DOB : </label>
          <input type="date" name="Date Of Birth" id="dob" />
        </div>
        <br />
        <div>
          <label for="skills">Select Your Skills:</label>
          <input type="checkbox" name="skills" id="skills" />HTML
          <input type="checkbox" name="skills" id="skills" />CSS
          <input type="checkbox" name="skills" id="skills" />JS
          <input type="checkbox" name="skills" id="skills" />SQL
          <input type="checkbox" name="skills" id="skills" />JAVA
          <input type="checkbox" name="skills" id="skills" />PYTHON
        </div>
        <br />
        <div>
          <label for="file">Upload Your Resume : </label>
          <input type="file" name="file" id="file" />
        </div>
        <br />
        <div>
          <label for="slots">Select your slots : </label>
          <input type="number" name="" id="" />
        </div>
        <br />
        <div>
          <input type="checkbox" name="" id="tac" />
          <label for="tac">I agree the Terms and Conditions</label>
        </div>
        <br />
        <div>
          <input type="submit" value="SUBMIT" />
          <input type="reset" value="Reset" />
        </div>
        
      </fieldset>
    </form>
  </body>
</html>
